<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMW Models</title>

    <link rel="icon" href="https://images.icon-icons.com/1834/PNG/512/iconfinderbmwlogo4140436-115966_115915.png" type="image/x-icon">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="index.css" />

    <script src="script.js" defer></script>
    
    
  </head>

  <body class="bg-dark text-white">
    <div id="navbar">
      <script src="navbar.js"></script>

      <script>
        loadNavbar();
      </script>
    </div>

    <div class="container py-5 mt-2">
      <h1 class="m-5 text-center">BMW All Models</h1>

      <div class="mb-4 text-center">
        <button class="btn btn-outline-warning filter-btn active m-2" data-filter="all">
          All
        </button>
        <button class="btn btn-outline-warning filter-btn m-2" data-filter="SUV">
          SUV
        </button>
        <button
          class="btn btn-outline-warning filter-btn m-2"
          data-filter="Sedan"
        >
          Sedan
        </button>
        <button
          class="btn btn-outline-warning  filter-btn m-2"
          data-filter="Coupe"
        >
          Coupe
        </button>
      </div>

      <div class="row" id="carContainer"></div>
    </div>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="carModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content glass-modal text-white">
          <div class="modal-header">
            <h5 class="modal-title" id="modalCarName"></h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <img id="modalCarImage" class="img-fluid rounded mb-3" />

            <p class="text-warning fs-4" id="modalCarPrice"></p>

            <ul id="modalCarSpecs" class="list-group list-group-flush"></ul>
          </div>
        </div>
      </div>
    </div>
    <script src="model.js"></script>

    <div id="footer">
      <script src="footer.js"></script>

      <script>
        loadFooter();
      </script>
    </div>
  </body>
</html>
